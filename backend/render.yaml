# render.yaml - Render deployment configuration
services:
  - type: web
    name: electro-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: electro-db
          property: connectionString
    
  - type: pserv
    name: electro-db
    dbVersion: "15"
    plan: starter
